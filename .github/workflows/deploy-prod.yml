name: Deploy Production (Manual)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "GHCR image tag to deploy (e.g. main or sha-<gitsha>)"
        required: true
        default: "main"
      deploy_path:
        description: "Remote directory containing .env and compose deployment files"
        required: true
        default: "/opt/ai-coding-tutor"
      deployment_data_mode:
        description: "How deployment should handle runtime data after creating a snapshot"
        required: true
        type: choice
        default: "keep_existing_data"
        options:
          - keep_existing_data
          - restore_from_deployment_backup
          - start_with_empty_data
      empty_data_confirm:
        description: "Required only for deployment_data_mode=start_with_empty_data: type START_WITH_EMPTY_DATA"
        required: false
        default: ""
      force_reissue_certificate:
        description: "Force certificate reissuance using current WEBSITE_DOMAIN and WEBSITE_ALT_DOMAINS"
        required: true
        type: choice
        default: "false"
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image names
        id: vars
        shell: bash
        run: |
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo_lc="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          echo "owner_lc=$owner_lc" >> "$GITHUB_OUTPUT"
          echo "repo_lc=$repo_lc" >> "$GITHUB_OUTPUT"

      - name: Ensure remote deploy directory exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -eu
            mkdir -p "${{ inputs.deploy_path }}"

      - name: Upload compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: "docker-compose.prod.yml"
          target: "${{ inputs.deploy_path }}"
          overwrite: true

      - name: Upload backup helper script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: "scripts/ops/create_backup_snapshot.sh"
          target: "${{ inputs.deploy_path }}"
          overwrite: true

      - name: Deploy selected image tag
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ inputs.deploy_path }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          DEPLOYMENT_DATA_MODE: ${{ inputs.deployment_data_mode }}
          EMPTY_DATA_CONFIRM: ${{ inputs.empty_data_confirm }}
          FORCE_REISSUE_CERTIFICATE: ${{ inputs.force_reissue_certificate }}
          GHCR_OWNER: ${{ steps.vars.outputs.owner_lc }}
          GHCR_IMAGE_PREFIX: ${{ steps.vars.outputs.repo_lc }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: DEPLOY_PATH,IMAGE_TAG,DEPLOYMENT_DATA_MODE,EMPTY_DATA_CONFIRM,FORCE_REISSUE_CERTIFICATE,GHCR_OWNER,GHCR_IMAGE_PREFIX,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"

            if [ ! -f .env ]; then
              echo "Missing $DEPLOY_PATH/.env (use .github/workflows/templates/env.prod.example as your template)"
              exit 1
            fi
            if [ ! -f docker-compose.prod.yml ]; then
              echo "Missing $DEPLOY_PATH/docker-compose.prod.yml"
              exit 1
            fi

            BACKUP_SCRIPT_PATH="$DEPLOY_PATH/scripts/ops/create_backup_snapshot.sh"
            BACKUP_ROOT="/opt/backups/ai-coding-tutor/daily"
            if [ ! -f "$BACKUP_SCRIPT_PATH" ] && [ -f "$DEPLOY_PATH/create_backup_snapshot.sh" ]; then
              mkdir -p "$DEPLOY_PATH/scripts/ops"
              mv "$DEPLOY_PATH/create_backup_snapshot.sh" "$BACKUP_SCRIPT_PATH"
            fi
            if [ ! -f "$BACKUP_SCRIPT_PATH" ]; then
              echo "Missing backup helper script: $BACKUP_SCRIPT_PATH"
              exit 1
            fi
            chmod +x "$BACKUP_SCRIPT_PATH"

            get_env_value() {
              __env_key="$1"
              __env_line="$(grep -E "^${__env_key}=" .env | tail -n 1 || true)"
              if [ -z "$__env_line" ]; then
                return 1
              fi
              __env_value="${__env_line#*=}"
              __env_value="${__env_value%$'\r'}"
              case "$__env_value" in
                \"*\")
                  __env_value="${__env_value#\"}"
                  __env_value="${__env_value%\"}"
                  ;;
                \'*\')
                  __env_value="${__env_value#\'}"
                  __env_value="${__env_value%\'}"
                  ;;
              esac
              printf '%s' "$__env_value"
            }

            trim_env_value() {
              printf '%s' "$1" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//'
            }

            normalise_domain_value() {
              __domain="$(trim_env_value "$1")"
              __domain="$(printf '%s' "$__domain" | tr '[:upper:]' '[:lower:]')"
              __domain="${__domain#http://}"
              __domain="${__domain#https://}"
              __domain="${__domain%%/*}"
              __domain="${__domain%.}"
              printf '%s' "$__domain"
            }

            WEBSITE_DOMAIN_VALUE="$(get_env_value WEBSITE_DOMAIN || true)"
            WEBSITE_ALT_DOMAINS_VALUE="$(get_env_value WEBSITE_ALT_DOMAINS || true)"
            CERTBOT_EMAIL_VALUE="$(get_env_value CERTBOT_EMAIL || true)"
            ADMIN_EMAIL_VALUE="$(get_env_value ADMIN_EMAIL || true)"
            POSTGRES_USER_VALUE="$(get_env_value POSTGRES_USER || true)"
            POSTGRES_DB_VALUE="$(get_env_value POSTGRES_DB || true)"

            WEBSITE_DOMAIN_VALUE="$(normalise_domain_value "${WEBSITE_DOMAIN_VALUE:-}")"
            WEBSITE_ALT_DOMAINS_VALUE="$(trim_env_value "${WEBSITE_ALT_DOMAINS_VALUE:-}")"
            CERTBOT_EMAIL_VALUE="$(trim_env_value "${CERTBOT_EMAIL_VALUE:-}")"
            ADMIN_EMAIL_VALUE="$(trim_env_value "${ADMIN_EMAIL_VALUE:-}")"
            POSTGRES_USER_VALUE="$(trim_env_value "${POSTGRES_USER_VALUE:-}")"
            POSTGRES_DB_VALUE="$(trim_env_value "${POSTGRES_DB_VALUE:-}")"

            if [ -z "${WEBSITE_DOMAIN_VALUE:-}" ]; then
              echo "Missing WEBSITE_DOMAIN in $DEPLOY_PATH/.env"
              echo "Use .github/workflows/templates/env.prod.example as the template."
              exit 1
            fi
            if [ -z "${POSTGRES_USER_VALUE:-}" ] || [ -z "${POSTGRES_DB_VALUE:-}" ]; then
              echo "Missing POSTGRES_USER or POSTGRES_DB in $DEPLOY_PATH/.env"
              exit 1
            fi

            case "${DEPLOYMENT_DATA_MODE:-}" in
              keep_existing_data|restore_from_deployment_backup|start_with_empty_data)
                ;;
              *)
                echo "Unsupported deployment_data_mode: ${DEPLOYMENT_DATA_MODE:-}"
                exit 1
                ;;
            esac

            if [ "${DEPLOYMENT_DATA_MODE}" = "start_with_empty_data" ] && [ "${EMPTY_DATA_CONFIRM:-}" != "START_WITH_EMPTY_DATA" ]; then
              echo "Refusing empty-data deployment because empty_data_confirm did not match START_WITH_EMPTY_DATA."
              exit 1
            fi

            FORCE_REISSUE_VALUE="$(trim_env_value "${FORCE_REISSUE_CERTIFICATE:-false}")"
            FORCE_REISSUE_VALUE="$(printf '%s' "$FORCE_REISSUE_VALUE" | tr '[:upper:]' '[:lower:]')"
            case "$FORCE_REISSUE_VALUE" in
              true|1|yes)
                FORCE_REISSUE_ENABLED=1
                ;;
              false|0|no|"")
                FORCE_REISSUE_ENABLED=0
                ;;
              *)
                echo "Unsupported force_reissue_certificate value: ${FORCE_REISSUE_CERTIFICATE:-}"
                echo "Supported values: true or false."
                exit 1
                ;;
            esac

            TARGET_DOMAINS=()
            TARGET_DOMAINS+=("$WEBSITE_DOMAIN_VALUE")
            ALT_DOMAINS_NORMALISED="$(printf '%s' "${WEBSITE_ALT_DOMAINS_VALUE:-}" | tr ',;\n\r\t' '     ')"
            for candidate in $ALT_DOMAINS_NORMALISED; do
              candidate="$(normalise_domain_value "$candidate")"
              if [ -z "$candidate" ]; then
                continue
              fi
              is_duplicate=0
              for existing in "${TARGET_DOMAINS[@]}"; do
                if [ "$existing" = "$candidate" ]; then
                  is_duplicate=1
                  break
                fi
              done
              if [ "$is_duplicate" -eq 0 ]; then
                TARGET_DOMAINS+=("$candidate")
              fi
            done

            PRIMARY_DOMAIN_VALUE="${TARGET_DOMAINS[0]}"
            SERVER_NAME_VALUE="$(printf '%s ' "${TARGET_DOMAINS[@]}")"
            SERVER_NAME_VALUE="${SERVER_NAME_VALUE% }"
            TLS_CERT_PATH_VALUE="/etc/letsencrypt/live/${PRIMARY_DOMAIN_VALUE}/fullchain.pem"
            TLS_KEY_PATH_VALUE="/etc/letsencrypt/live/${PRIMARY_DOMAIN_VALUE}/privkey.pem"
            CERTBOT_DOMAIN_ARGS=()
            for domain in "${TARGET_DOMAINS[@]}"; do
              CERTBOT_DOMAIN_ARGS+=("-d" "$domain")
            done

            if [ -z "${CERTBOT_EMAIL_VALUE:-}" ] && [ -n "${ADMIN_EMAIL_VALUE:-}" ]; then
              CERTBOT_EMAIL_VALUE="${ADMIN_EMAIL_VALUE%%,*}"
            fi
            CERTBOT_EMAIL_VALUE="$(trim_env_value "${CERTBOT_EMAIL_VALUE:-}")"

            compose() {
              docker compose -f docker-compose.prod.yml "$@"
            }

            certificate_covers_all_domains() {
              cert_domains="$(
                compose --profile ops run --rm --no-deps --entrypoint sh certbot -lc \
                  "CERT_PATH=\"$TLS_CERT_PATH_VALUE\" python -c \"import os,ssl,sys; p=os.environ.get('CERT_PATH','').strip(); d=ssl._ssl._test_decode_cert(p) if p else (_ for _ in ()).throw(SystemExit(1)); print('\\n'.join(v.strip().lower() for t,v in d.get('subjectAltName',[]) if t=='DNS' and str(v).strip()))\"" \
                  || true
              )"
              cert_domains="$(trim_env_value "${cert_domains:-}")"
              if [ -z "$cert_domains" ]; then
                return 1
              fi
              for domain in "${TARGET_DOMAINS[@]}"; do
                if ! printf '%s\n' "$cert_domains" | grep -Fxqi "$domain"; then
                  return 1
                fi
              done
              return 0
            }

            remove_legacy_certificates() {
              cert_names="$(
                compose --profile ops run --rm --no-deps --entrypoint sh certbot -lc \
                  "certbot certificates 2>/dev/null | sed -n 's/^[[:space:]]*Certificate Name:[[:space:]]*//p'" \
                  || true
              )"
              cert_names="$(trim_env_value "${cert_names:-}")"
              if [ -z "$cert_names" ]; then
                echo "No legacy certificate lineages found to remove."
                return 0
              fi

              printf '%s\n' "$cert_names" | while IFS= read -r cert_name; do
                cert_name="$(trim_env_value "$cert_name")"
                if [ -z "$cert_name" ] || [ "$cert_name" = "$PRIMARY_DOMAIN_VALUE" ]; then
                  continue
                fi
                echo "Removing legacy certificate lineage: $cert_name"
                compose --profile ops run --rm --no-deps --entrypoint certbot certbot \
                  delete --non-interactive --quiet --cert-name "$cert_name"
              done
            }

            ensure_tls_certificate() {
              has_cert_files=0
              if compose --profile ops run --rm --no-deps --entrypoint sh certbot -lc \
                "test -f \"$TLS_CERT_PATH_VALUE\" && test -f \"$TLS_KEY_PATH_VALUE\""; then
                has_cert_files=1
              fi

              if [ "$FORCE_REISSUE_ENABLED" -eq 0 ] && [ "$has_cert_files" -eq 1 ] && certificate_covers_all_domains; then
                echo "TLS certificate already covers configured domains: $SERVER_NAME_VALUE"
                return 0
              fi

              if [ -z "${CERTBOT_EMAIL_VALUE:-}" ]; then
                echo "TLS certificate is missing required domains and no Certbot contact email is configured."
                echo "Set CERTBOT_EMAIL (preferred) or ADMIN_EMAIL in $DEPLOY_PATH/.env."
                exit 1
              fi

              if [ "$FORCE_REISSUE_ENABLED" -eq 1 ]; then
                echo "Force reissue mode is enabled. Reissuing certificate for: ${SERVER_NAME_VALUE}"
              elif [ "$has_cert_files" -eq 1 ]; then
                echo "Expanding TLS certificate to cover configured domains: ${SERVER_NAME_VALUE}"
              else
                echo "Issuing a new TLS certificate for configured domains: ${SERVER_NAME_VALUE}"
              fi

              CERTBOT_ISSUE_ARGS=(
                certonly
                --standalone
                --non-interactive
                --agree-tos
                --no-eff-email
                --cert-name "${PRIMARY_DOMAIN_VALUE}"
              )
              if [ "$FORCE_REISSUE_ENABLED" -eq 1 ]; then
                CERTBOT_ISSUE_ARGS+=(--force-renewal)
              else
                CERTBOT_ISSUE_ARGS+=(--expand)
              fi

              compose stop frontend >/dev/null 2>&1 || true
              compose --profile ops run --rm --no-deps -p 80:80 --entrypoint certbot certbot \
                "${CERTBOT_ISSUE_ARGS[@]}" \
                "${CERTBOT_DOMAIN_ARGS[@]}" \
                -m "${CERTBOT_EMAIL_VALUE}"

              if ! compose --profile ops run --rm --no-deps --entrypoint sh certbot -lc \
                "test -f \"$TLS_CERT_PATH_VALUE\" && test -f \"$TLS_KEY_PATH_VALUE\""; then
                echo "Certbot finished, but TLS certificate files are still missing."
                echo "Expected files: $TLS_CERT_PATH_VALUE and $TLS_KEY_PATH_VALUE"
                exit 1
              fi

              if ! certificate_covers_all_domains; then
                echo "Certbot finished, but certificate domains do not match: ${SERVER_NAME_VALUE}"
                exit 1
              fi

              if [ "$FORCE_REISSUE_ENABLED" -eq 1 ]; then
                # In force mode, keep the active primary lineage and remove older lineages.
                remove_legacy_certificates
              fi

              echo "TLS certificate is ready for domains: ${SERVER_NAME_VALUE}"
            }

            clear_database() {
              compose exec -T db sh -lc "psql -v ON_ERROR_STOP=1 -U \"$POSTGRES_USER_VALUE\" -d \"$POSTGRES_DB_VALUE\" \
                -c \"DROP SCHEMA IF EXISTS public CASCADE;\" \
                -c \"CREATE SCHEMA public;\" \
                -c \"GRANT ALL ON SCHEMA public TO PUBLIC;\""
            }

            clear_file_data() {
              compose run --rm --no-deps --entrypoint sh backend -lc "set -eu; \
                mkdir -p /data/uploads /data/notebooks; \
                find /data/uploads -mindepth 1 -delete; \
                find /data/notebooks -mindepth 1 -delete"
            }

            restore_from_snapshot() {
              snapshot_dir="$1"

              if [ ! -f "$snapshot_dir/db.dump.zst" ] || [ ! -f "$snapshot_dir/uploads.tar.zst" ] || [ ! -f "$snapshot_dir/notebooks.tar.zst" ]; then
                echo "Snapshot is incomplete: $snapshot_dir"
                exit 1
              fi

              zstd -dc "$snapshot_dir/db.dump.zst" \
                | compose exec -T db sh -lc "pg_restore -U \"$POSTGRES_USER_VALUE\" -d \"$POSTGRES_DB_VALUE\" --clean --if-exists --no-owner --no-privileges"

              zstd -dc "$snapshot_dir/uploads.tar.zst" \
                | compose run --rm --no-deps --entrypoint sh backend -lc "set -eu; mkdir -p /data/uploads; tar -C /data/uploads -xf -"

              zstd -dc "$snapshot_dir/notebooks.tar.zst" \
                | compose run --rm --no-deps --entrypoint sh backend -lc "set -eu; mkdir -p /data/notebooks; tar -C /data/notebooks -xf -"
            }

            if [ -n "${GHCR_TOKEN:-}" ] && [ -n "${GHCR_USERNAME:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            export GHCR_OWNER
            export GHCR_IMAGE_PREFIX
            export IMAGE_TAG
            export SERVER_NAME="$SERVER_NAME_VALUE"
            export PRIMARY_DOMAIN="$PRIMARY_DOMAIN_VALUE"

            compose config >/dev/null
            compose pull

            compose up -d db
            compose stop frontend backend >/dev/null 2>&1 || true

            SNAPSHOT_OUTPUT="$("$BACKUP_SCRIPT_PATH" --deploy-path "$DEPLOY_PATH" --backup-root "$BACKUP_ROOT" --source deployment --deployment-data-mode "$DEPLOYMENT_DATA_MODE")"
            echo "$SNAPSHOT_OUTPUT"
            SNAPSHOT_DIR="$(printf '%s\n' "$SNAPSHOT_OUTPUT" | awk -F= '$1=="SNAPSHOT_DIR" {print $2}' | tail -n 1)"
            if [ -z "$SNAPSHOT_DIR" ] || [ ! -d "$SNAPSHOT_DIR" ]; then
              echo "Failed to create deployment snapshot."
              exit 1
            fi

            case "$DEPLOYMENT_DATA_MODE" in
              keep_existing_data)
                echo "Deployment data mode: keep_existing_data"
                ;;
              restore_from_deployment_backup)
                echo "Deployment data mode: restore_from_deployment_backup"
                clear_database
                clear_file_data
                restore_from_snapshot "$SNAPSHOT_DIR"
                ;;
              start_with_empty_data)
                echo "Deployment data mode: start_with_empty_data"
                clear_database
                clear_file_data
                ;;
            esac

            compose up -d db backend
            ensure_tls_certificate
            compose up -d frontend
            compose --profile ops up -d certbot
            compose ps

            if ! compose exec -T backend python - <<'PY'
            import json
            import sys
            import urllib.request


            def fetch(url: str):
                with urllib.request.urlopen(url, timeout=15) as response:
                    return json.loads(response.read().decode("utf-8"))


            health = fetch("http://127.0.0.1:8000/health")
            print({"health": health})

            ai_health = fetch("http://127.0.0.1:8000/api/health/ai?force=true")
            print({"ai_health": ai_health})

            if not (ai_health.get("anthropic") or ai_health.get("openai") or ai_health.get("google")):
                sys.exit("Post-deploy health check failed: no configured LLM provider is currently reachable")
            PY
            then
              echo "Post-deploy health check failed. Printing recent backend logs..."
              compose logs --tail=200 backend || true
              exit 1
            fi

            echo "Deployment completed with data mode: $DEPLOYMENT_DATA_MODE"
            echo "Deployment snapshot: $SNAPSHOT_DIR"
